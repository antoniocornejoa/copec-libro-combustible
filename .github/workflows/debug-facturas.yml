name: Debug - consultarfacturas

# Diagnostico temporal: averiguar por que consultarfacturas devuelve 0.
# Solo lectura: no escribe datos ni hace commit.
# El script imprime SOLO la estructura de la respuesta (este repo es publico).

on:
  workflow_dispatch:
    inputs:
      month:
        description: 'Mes a consultar (YYYY-MM)'
        required: false
        default: '2026-03'
        type: string

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Consultar facturas (solo estructura)
        env:
          COPEC_ACCESS_TOKEN: ${{ secrets.COPEC_ACCESS_TOKEN }}
          COPEC_EQUIPO_SECRET: ${{ secrets.COPEC_EQUIPO_SECRET }}
          COPEC_CUENTA_ID: ${{ secrets.COPEC_CUENTA_ID }}
        run: node debug-facturas.js ${{ github.event.inputs.month || '2026-03' }}
