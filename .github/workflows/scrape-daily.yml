name: Scrape Copec - Diario

on:
  schedule:
    - cron: '0 21 * * *'

  workflow_dispatch:
    inputs:
      month:
        description: 'Mes a extraer (formato: YYYY-MM, ej: 2026-04). Vacio = mes actual'
        required: false
        type: string

env:
  TELEGRAM_BOT_TOKEN: "8079354281:AAFKIpTXr0xCxc9z_z5sgJYjtp1vXFfjo7w"
  TELEGRAM_CHAT_ID: "6287597179"

permissions:
  contents: write
  pages: write
  id-token: write

# Serializa las corridas. Si se disparan varios meses a la vez, se encolan en
# vez de correr en paralelo y pisarse el git push entre ellas.
concurrency:
  group: scrape-copec
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      month: ${{ steps.month.outputs.target }}
      tx_count: ${{ steps.result.outputs.tx_count }}

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determinar mes a extraer
        id: month
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            echo "target=${{ github.event.inputs.month }}" >> $GITHUB_OUTPUT
          else
            echo "target=$(TZ='America/Santiago' date '+%Y-%m')" >> $GITHUB_OUTPUT
          fi

      - name: Ejecutar scraper
        env:
          COPEC_ACCESS_TOKEN: ${{ secrets.COPEC_ACCESS_TOKEN }}
          COPEC_EQUIPO_SECRET: ${{ secrets.COPEC_EQUIPO_SECRET }}
          COPEC_CUENTA_ID: ${{ secrets.COPEC_CUENTA_ID }}
        run: node scraper.js --month ${{ steps.month.outputs.target }}

      # Tasas oficiales del impuesto especifico (SII / MEPCO + UTM).
      # Si el SII falla, se conserva el tasas-sii.json anterior y el scrape sigue.
      - name: Descargar tasas SII
        continue-on-error: true
        run: node sii-tasas.js

      - name: Verificar archivos generados
        id: result
        run: |
          echo "=== Archivos generados ==="
          ls -la public/data/
          MONTH="${{ steps.month.outputs.target }}"
          FILE="public/data/${MONTH}.json"
          if [ -f "$FILE" ]; then
            TX=$(node -e "const d=require('./'+process.argv[1]);console.log((d.transactions||[]).length)" "$FILE")
            echo "tx_count=$TX" >> $GITHUB_OUTPUT
          else
            echo "tx_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Commit y push datos
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos"
          else
            MONTH="${{ steps.month.outputs.target }}"
            git commit -m "datos: actualizar transacciones ${MONTH}"
            # Rebase por si el remoto avanzo mientras corria el scraper
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Notificar exito por Telegram
        if: success()
        run: |
          MONTH="${{ steps.month.outputs.target }}"
          TX="${{ steps.result.outputs.tx_count }}"
          MSG=$(printf '✅ Scraper Copec OK\n📅 Mes: %s\n📊 Transacciones: %s\n🔗 https://antoniocornejoa.github.io/copec-libro-combustible/' "$MONTH" "$TX")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$MSG" > /dev/null

      - name: Notificar error por Telegram
        if: failure()
        run: |
          MONTH="${{ steps.month.outputs.target }}"
          MSG=$(printf '❌ Error en scraper Copec\n📅 Mes: %s\n⚠️ Posiblemente tokens expirados\nRevisa: https://github.com/antoniocornejoa/copec-libro-combustible/actions' "$MONTH")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$MSG" > /dev/null

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    if: success()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
