name: Scrape Copec - Diario

on:
  schedule:
    - cron: '0 21 * * *'

  workflow_dispatch:
    inputs:
      month:
        description: 'Mes a extraer (formato: YYYY-MM, ej: 2026-04). Vacio = mes actual'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determinar mes a extraer
        id: month
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            echo "target=${{ github.event.inputs.month }}" >> $GITHUB_OUTPUT
          else
            echo "target=$(TZ='America/Santiago' date '+%Y-%m')" >> $GITHUB_OUTPUT
          fi

      - name: Ejecutar scraper
        env:
          COPEC_ACCESS_TOKEN: ${{ secrets.COPEC_ACCESS_TOKEN }}
          COPEC_FIRMA: ${{ secrets.COPEC_FIRMA }}
          COPEC_CUENTA_ID: ${{ secrets.COPEC_CUENTA_ID }}
        run: node scraper.js --month ${{ steps.month.outputs.target }}

      - name: Verificar archivos generados
        run: |
          echo "=== Archivos generados ==="
          ls -la public/data/
          echo ""
          echo "=== Index ==="
          cat public/data/index.json

      - name: Commit y push datos
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos"
          else
            MONTH="${{ steps.month.outputs.target }}"
            git commit -m "datos: actualizar transacciones ${MONTH}"
            git push
          fi

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    if: success()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
